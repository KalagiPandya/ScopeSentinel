<svg width="100%" height="140" viewBox="0 0 1200 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradFooter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9D50BB">
        <animate attributeName="stop-color"
          values="#9D50BB;#6A11CB;#B266FF;#9D50BB"
          dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#6A11CB">
        <animate attributeName="stop-color"
          values="#6A11CB;#B266FF;#6A11CB;#9D50BB"
          dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>

  <rect width="1200" height="140" fill="url(#bgGradFooter)" />

  <!-- animated wave -->
  <path fill="#ffffff" opacity="0.1">
    <animate attributeName="d" dur="5s" repeatCount="indefinite"
      values="
        M0,20 C300,45 900,0 1200,25 L1200,0 L0,0 Z;
        M0,30 C300,5 900,40 1200,10 L1200,0 L0,0 Z;
        M0,20 C300,45 900,0 1200,25 L1200,0 L0,0 Z" />
  </path>

  <text x="600" y="75" font-family="Fira Code, monospace" font-size="24"
        font-weight="600" fill="#ffffff" text-anchor="middle">
    Made with 🟣 and a lot of coffee — ScopeSentinel
    <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze" />
  </text>

  <text x="600" y="105" font-family="Fira Code, monospace" font-size="14"
        fill="#f2e9ff" text-anchor="middle" opacity="0.85">
    Stop finding scope creep in the retro. Find it the moment it happens.
  </text>
</svg>