<svg width="100%" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6A11CB">
        <animate attributeName="stop-color"
          values="#6A11CB;#9D50BB;#B266FF;#6A11CB"
          dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#9D50BB">
        <animate attributeName="stop-color"
          values="#9D50BB;#6A11CB;#9D50BB;#B266FF"
          dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>

  <rect width="1200" height="220" fill="url(#bgGrad)" />

  <!-- animated wave layer 1 -->
  <path fill="#ffffff" opacity="0.08">
    <animate attributeName="d" dur="5s" repeatCount="indefinite"
      values="
        M0,160 C300,190 900,130 1200,170 L1200,220 L0,220 Z;
        M0,175 C300,140 900,190 1200,150 L1200,220 L0,220 Z;
        M0,160 C300,190 900,130 1200,170 L1200,220 L0,220 Z" />
  </path>

  <!-- animated wave layer 2 -->
  <path fill="#ffffff" opacity="0.12">
    <animate attributeName="d" dur="7s" repeatCount="indefinite"
      values="
        M0,190 C400,210 800,160 1200,195 L1200,220 L0,220 Z;
        M0,200 C400,170 800,210 1200,180 L1200,220 L0,220 Z;
        M0,190 C400,210 800,160 1200,195 L1200,220 L0,220 Z" />
  </path>

  <!-- title -->
  <text x="600" y="95" font-family="Fira Code, monospace" font-size="58"
        font-weight="700" fill="#ffffff" text-anchor="middle">
    ScopeSentinel
    <animate attributeName="opacity" values="0;1" dur="1.2s" fill="freeze" />
  </text>

  <!-- subtitle -->
  <text x="600" y="135" font-family="Fira Code, monospace" font-size="18"
        fill="#f2e9ff" text-anchor="middle" opacity="0.95">
    AI Requirement Guardian &amp; GitHub Engineering Intelligence Platform
    <animate attributeName="opacity" values="0;0.95" dur="1.8s" fill="freeze" />
  </text>
</svg>