<svg width="100%" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spaceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0d21"/>
      <stop offset="50%" stop-color="#1a1440"/>
      <stop offset="100%" stop-color="#2d1b5e"/>
    </linearGradient>

    <radialGradient id="scanBeam" cx="0%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#B266FF" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#B266FF" stop-opacity="0"/>
    </radialGradient>

    <filter id="nodeGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="260" fill="url(#spaceBg)"/>

  <!-- faint grid -->
  <g stroke="#8f6fff" stroke-opacity="0.08">
    <path d="M0,0 L1200,0 M0,40 L1200,40 M0,80 L1200,80 M0,120 L1200,120 M0,160 L1200,160 M0,200 L1200,200 M0,240 L1200,240"/>
    <path d="M0,0 L0,260 M100,0 L100,260 M200,0 L200,260 M300,0 L300,260 M400,0 L400,260 M500,0 L500,260 M600,0 L600,260 M700,0 L700,260 M800,0 L800,260 M900,0 L900,260 M1000,0 L1000,260 M1100,0 L1100,260 M1200,0 L1200,260"/>
  </g>

  <!-- dependency-graph nodes + connecting lines -->
  <g stroke="#9D50BB" stroke-opacity="0.35" stroke-width="1.2" fill="none">
    <line x1="120" y1="60" x2="260" y2="120"/>
    <line x1="260" y1="120" x2="180" y2="200"/>
    <line x1="950" y1="50" x2="1080" y2="110"/>
    <line x1="1080" y1="110" x2="1000" y2="190"/>
    <line x1="80" y1="190" x2="180" y2="200"/>
    <line x1="1100" y1="200" x2="1000" y2="190"/>
  </g>
  <g fill="#B266FF" filter="url(#nodeGlow)">
    <circle cx="120" cy="60" r="4">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="260" cy="120" r="3.5">
      <animate attributeName="opacity" values="1;0.3;1" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="180" cy="200" r="4">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="190" r="3">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="950" cy="50" r="3.5">
      <animate attributeName="opacity" values="1;0.4;1" dur="2.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1080" cy="110" r="4">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="190" r="3.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1100" cy="200" r="3">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- rotating radar sweep, centered on the title -->
  <g>
    <circle cx="600" cy="135" r="150" fill="none" stroke="#8f6fff" stroke-opacity="0.25" stroke-width="1"/>
    <circle cx="600" cy="135" r="95" fill="none" stroke="#8f6fff" stroke-opacity="0.18" stroke-width="1"/>
    <g transform="translate(600,135)">
      <path d="M0,0 L150,-40 A150,150 0 0,1 150,40 Z" fill="url(#scanBeam)">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
      </path>
    </g>
    <circle cx="600" cy="135" r="150" fill="none" stroke="#B266FF" stroke-opacity="0.5" stroke-width="1.5">
      <animate attributeName="r" values="20;150" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- title -->
  <text x="600" y="120" font-family="Fira Code, monospace" font-size="56" font-weight="700"
        fill="#ffffff" text-anchor="middle" filter="url(#textGlow)">
    ScopeSentinel
    <animate attributeName="opacity" values="0;1" dur="1.4s" fill="freeze"/>
  </text>

  <!-- subtitle -->
  <text x="600" y="160" font-family="Fira Code, monospace" font-size="16" letter-spacing="0.5"
        fill="#c9b8ff" text-anchor="middle" opacity="0">
    AI Requirement Guardian &amp; GitHub Engineering Intelligence Platform
    <animate attributeName="opacity" values="0;0;0.9" dur="2.2s" fill="freeze"/>
  </text>

  <!-- status line, styled like a terminal readout -->
  <text x="600" y="200" font-family="Fira Code, monospace" font-size="13"
        fill="#8f6fff" text-anchor="middle" opacity="0">
    &gt; watching 8 agents · monitoring drift · status: online
    <animate attributeName="opacity" values="0;0;0.85" dur="3s" fill="freeze"/>
  </text>
</svg>